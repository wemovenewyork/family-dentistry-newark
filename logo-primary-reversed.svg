<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 96" role="img" aria-label="Family Dentistry Newark logo">
  <title>Family Dentistry Newark</title>

  <!-- ===== Icon: rounded badge + tooth mark ===== -->
  <g transform="translate(8, 12)">
    <rect x="0" y="0" width="72" height="72" rx="20" fill="#FFFFFF"/>
    <!-- tooth -->
    <path d="M36 16.5
             c-5.6 0-8.6 2.8-12.4 2.8
             c-2.9 0-4.7-1.9-6.7-1.9
             c-1.6 0-3 1.1-3 4.6
             c0 6.4 1.9 12.4 3.9 18.4
             c1.7 5.1 2.6 11.3 5.7 11.3
             c3.3 0 3.1-8.6 5.9-8.6
             c2.8 0 2.6 8.6 5.9 8.6
             c3.1 0 4-6.2 5.7-11.3
             c2-6 3.9-12 3.9-18.4
             c0-3.5-1.4-4.6-3-4.6
             c-2 0-3.8 1.9-6.7 1.9
             C44.6 19.3 41.6 16.5 36 16.5 Z"
          fill="#143C6B"/>
    <!-- subtle shine accent -->
    <path d="M27 24.5
             c2.2-1.4 4.7-2.1 7.3-2.1"
          fill="none" stroke="#2F7DC2" stroke-width="2.4" stroke-linecap="round"/>
  </g>

  <!-- ===== Wordmark ===== -->
  <g transform="translate(96, 0)">
    <text x="0" y="44"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="27" font-weight="400" letter-spacing="0.2"
          fill="#FFFFFF">Family Dentistry</text>
    <text x="0" y="71"
          font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
          font-size="15.5" font-weight="500" letter-spacing="3.4"
          fill="#2F7DC2">N E W A R K</text>
    <!-- divider rule between the two words -->
    <line x1="1" y1="52.5" x2="232" y2="52.5" stroke="#FFFFFF" stroke-width="1" opacity="0.3"/>
  </g>
</svg>
